name: Deploy Aurora Registry to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'aurora/component/**'
      - '.github/workflows/deploy-registry.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aurora/component/package.json

      - name: Install shadcn CLI
        working-directory: aurora/component
        run: npm install

      - name: Build registry JSON
        working-directory: aurora/component
        run: npm run build:output

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: aurora/component/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
